name: CI/CD to Docker Hub

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: api-gateway
            context: ./api-gateway
          - service: auth-service
            context: ./services/auth-service
          - service: movie-service
            context: ./services/movie-service
          - service: booking-service
            context: ./services/booking-service
          - service: socket-service
            context: ./services/socket-service
          - service: forum-service
            context: ./services/forum-service
          - service: blog-service
            context: ./services/blog-service
          - service: frontend
            context: ./frontend
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ${{ matrix.context }}
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/n25-${{ matrix.service }}:latest
