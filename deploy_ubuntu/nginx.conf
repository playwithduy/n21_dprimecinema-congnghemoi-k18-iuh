events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    server {
        listen 80;

        # 1. Điều hướng cho Web Frontend (PHP)
        location / {
            proxy_pass http://web-frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 2. Điều hướng cho API Gateway
        # Khi Web gọi tới /api/..., Nginx sẽ chuyển tiếp tới api-gateway:3000/...
        location /api/ {
            proxy_pass http://api-gateway:3000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # 3. Điều hướng cho Web Admin (Tùy chọn)
        location /admin/ {
            proxy_pass http://web-admin:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
